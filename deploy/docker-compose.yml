networks:
  order-net:
    driver: bridge

volumes:
  mysql-order-data:
  mysql-inventory-data:
  mysql-payment-data:
  rabbitmq-data:

services:
  # ── MySQL ────────────────────────────────────────────────────
  mysql-order:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: orders_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-order-data:/var/lib/mysql
    networks:
      - order-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mysql-inventory:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: inventory_db
    ports:
      - "3308:3306"
    volumes:
      - mysql-inventory-data:/var/lib/mysql
    networks:
      - order-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mysql-payment:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: payments_db
    ports:
      - "3309:3306"
    volumes:
      - mysql-payment-data:/var/lib/mysql
    networks:
      - order-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── RabbitMQ ─────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - order-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Services ─────────────────────────────────────────────────
  # Build context is the project root (../) so Dockerfiles can COPY shared/
  order-service:
    build:
      context: ../
      dockerfile: services/order-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      ORDER_PORT: "8081"
      DB_HOST: mysql-order
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-rootpw}
      DB_NAME: orders_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    networks:
      - order-net
    depends_on:
      mysql-order:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inventory-service:
    build:
      context: ../
      dockerfile: services/inventory-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      INVENTORY_PORT: "8082"
      DB_HOST: mysql-inventory
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-rootpw}
      DB_NAME: inventory_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      INVENTORY_RESERVE_MAX_RETRIES: "${INVENTORY_RESERVE_MAX_RETRIES:-50}"
    networks:
      - order-net
    depends_on:
      mysql-inventory:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-service:
    build:
      context: ../
      dockerfile: services/payment-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      PAYMENT_PORT: "8083"
      DB_HOST: mysql-payment
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-rootpw}
      DB_NAME: payments_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PAYMENT_FAILURE_RATE: "${PAYMENT_FAILURE_RATE:-0.0}"
    networks:
      - order-net
    depends_on:
      mysql-payment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

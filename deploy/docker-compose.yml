networks:
  order-net:
    driver: bridge

volumes:
  mysql-order-data:
  mysql-inventory-data:
  mysql-payment-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:

services:
  # ── MySQL ────────────────────────────────────────────────────
  mysql-order:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: orders_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-order-data:/var/lib/mysql
    networks:
      - order-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mysql-inventory:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: inventory_db
    ports:
      - "3308:3306"
    volumes:
      - mysql-inventory-data:/var/lib/mysql
    networks:
      - order-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mysql-payment:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: payments_db
    ports:
      - "3309:3306"
    volumes:
      - mysql-payment-data:/var/lib/mysql
    networks:
      - order-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── RabbitMQ ─────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - order-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Services ─────────────────────────────────────────────────
  # Build context is the project root (../) so Dockerfiles can COPY shared/
  order-service:
    build:
      context: ../
      dockerfile: services/order-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      ORDER_PORT: "8081"
      DB_HOST: mysql-order
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-rootpw}
      DB_NAME: orders_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    networks:
      - order-net
    depends_on:
      mysql-order:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  inventory-service:
    build:
      context: ../
      dockerfile: services/inventory-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      INVENTORY_PORT: "8082"
      DB_HOST: mysql-inventory
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-rootpw}
      DB_NAME: inventory_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      INVENTORY_RESERVE_MAX_RETRIES: "${INVENTORY_RESERVE_MAX_RETRIES:-50}"
    networks:
      - order-net
    depends_on:
      mysql-inventory:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  payment-service:
    build:
      context: ../
      dockerfile: services/payment-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      PAYMENT_PORT: "8083"
      DB_HOST: mysql-payment
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-rootpw}
      DB_NAME: payments_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PAYMENT_FAILURE_RATE: "${PAYMENT_FAILURE_RATE:-0.0}"
    networks:
      - order-net
    depends_on:
      mysql-payment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8083/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ── Observability (Phase 7) ──────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - order-net
    depends_on:
      - order-service
      - inventory-service
      - payment-service

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - order-net
    depends_on:
      - prometheus
